version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stockai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockai
      POSTGRES_USER: stockai
      POSTGRES_PASSWORD: stockai_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stockai:stockai_secret@postgres:5432/stockai
      REDIS_URL: redis://redis:6379
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-demo}
      POLYGON_KEY: ${POLYGON_KEY:-demo}
      NEWS_API_KEY: ${NEWS_API_KEY:-demo}
      SECRET_KEY: ${SECRET_KEY:-supersecretchangeme}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/app/models/saved

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  model_cache:
